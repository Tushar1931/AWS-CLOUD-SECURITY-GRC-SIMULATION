<svg width="100%" viewBox="0 0 680 610" xmlns="http://www.w3.org/2000/svg" style="font-family: Arial, sans-serif; background: white;">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<marker id="arrow-dark" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#444441" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Background -->
<rect width="680" height="610" fill="white"/>

<!-- Title label -->
<text font-size="11" fill="#5F5E5A" x="34" y="24">AWS account — simulated lab environment</text>
<!-- AWS Account boundary (dashed) -->
<rect x="20" y="30" width="640" height="478" rx="14" fill="none" stroke="#B4B2A9" stroke-width="1.5" stroke-dasharray="8 4"/>

<!-- ====== IAM SECTION ====== -->
<rect x="40" y="46" width="600" height="176" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#2C2C2A" x="340" y="68" text-anchor="middle">Identity &amp; Access Management (IAM)</text>

<!-- admin-user (gray) -->
<rect x="60" y="82" width="158" height="52" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#2C2C2A" x="139" y="104" text-anchor="middle" dominant-baseline="central">admin-user</text>
<text font-size="12" fill="#5F5E5A" x="139" y="122" text-anchor="middle" dominant-baseline="central">Admin privileges</text>

<!-- dev-user (red - CRITICAL) -->
<rect x="236" y="82" width="158" height="52" rx="6" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1"/>
<text font-size="14" font-weight="500" fill="#791F1F" x="315" y="104" text-anchor="middle" dominant-baseline="central">dev-user</text>
<text font-size="12" fill="#A32D2D" x="315" y="122" text-anchor="middle" dominant-baseline="central">*:* all permissions</text>
<!-- R2 badge -->
<rect x="368" y="74" width="24" height="14" rx="7" fill="#FCEBEB" stroke="none"/>
<text font-size="11" font-weight="500" fill="#A32D2D" x="380" y="81" text-anchor="middle" dominant-baseline="central">R2</text>

<!-- analyst-user (teal - ok) -->
<rect x="412" y="82" width="158" height="52" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#085041" x="491" y="104" text-anchor="middle" dominant-baseline="central">analyst-user</text>
<text font-size="12" fill="#0F6E56" x="491" y="122" text-anchor="middle" dominant-baseline="central">ReadOnly access</text>

<!-- IAM notes -->
<text font-size="12" fill="#5F5E5A" x="340" y="155" text-anchor="middle">LimitedAccess group  ·  FullAccessCustomPolicy attached directly to dev-user</text>
<text font-size="12" fill="#5F5E5A" x="340" y="172" text-anchor="middle">No MFA configured on any user account</text>
<!-- R4 badge -->
<rect x="476" y="165" width="24" height="14" rx="7" fill="#FAEEDA" stroke="none"/>
<text font-size="11" font-weight="500" fill="#854F0B" x="488" y="172" text-anchor="middle" dominant-baseline="central">R4</text>

<!-- ====== S3 SECTION ====== -->
<rect x="40" y="240" width="278" height="128" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<!-- Red left accent -->
<line x1="42" y1="248" x2="42" y2="360" stroke="#A32D2D" stroke-width="4" stroke-linecap="round"/>
<text font-size="14" font-weight="500" fill="#2C2C2A" x="56" y="262">Amazon S3</text>
<!-- R1 badge -->
<rect x="130" y="252" width="24" height="14" rx="7" fill="#FCEBEB" stroke="none"/>
<text font-size="11" font-weight="500" fill="#A32D2D" x="142" y="259" text-anchor="middle" dominant-baseline="central">R1</text>
<text font-size="12" fill="#5F5E5A" x="56" y="282">tushar-risk-bucket</text>
<text font-size="12" fill="#5F5E5A" x="56" y="298">Block public access: DISABLED</text>
<text font-size="12" fill="#5F5E5A" x="56" y="314">customer_data.txt exposed</text>
<text font-size="12" fill="#5F5E5A" x="56" y="330">Object URL: no auth required</text>

<!-- ====== EC2 SECTION ====== -->
<rect x="362" y="240" width="278" height="128" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<!-- Red left accent -->
<line x1="364" y1="248" x2="364" y2="360" stroke="#A32D2D" stroke-width="4" stroke-linecap="round"/>
<text font-size="14" font-weight="500" fill="#2C2C2A" x="378" y="262">Amazon EC2</text>
<!-- R3 badge (amber - medium) -->
<rect x="454" y="252" width="24" height="14" rx="7" fill="#FAEEDA" stroke="none"/>
<text font-size="11" font-weight="500" fill="#854F0B" x="466" y="259" text-anchor="middle" dominant-baseline="central">R3</text>
<text font-size="12" fill="#5F5E5A" x="378" y="282">Risk-Instance (public IP)</text>
<text font-size="12" fill="#5F5E5A" x="378" y="298">Port 22 (SSH) → 0.0.0.0/0</text>
<text font-size="12" fill="#5F5E5A" x="378" y="314">Port 80 (HTTP) → 0.0.0.0/0</text>
<text font-size="12" fill="#5F5E5A" x="378" y="330">Security group: permissive</text>

<!-- ====== CLOUDTRAIL SECTION ====== -->
<rect x="40" y="388" width="278" height="112" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<!-- Amber left accent -->
<line x1="42" y1="396" x2="42" y2="492" stroke="#BA7517" stroke-width="4" stroke-linecap="round"/>
<text font-size="14" font-weight="500" fill="#2C2C2A" x="56" y="410">AWS CloudTrail</text>
<!-- R5 badge -->
<rect x="156" y="402" width="24" height="14" rx="7" fill="#FAEEDA" stroke="none"/>
<text font-size="11" font-weight="500" fill="#854F0B" x="168" y="409" text-anchor="middle" dominant-baseline="central">R5</text>
<text font-size="12" fill="#5F5E5A" x="56" y="430">SecurityTrail — logging active</text>
<text font-size="12" fill="#5F5E5A" x="56" y="447">Log file validation: OFF</text>
<text font-size="12" fill="#5F5E5A" x="56" y="464">CloudWatch integration: OFF</text>
<text font-size="12" fill="#5F5E5A" x="56" y="481">Insights (anomaly detect): OFF</text>

<!-- ====== SECURITY HUB SECTION ====== -->
<rect x="362" y="388" width="278" height="112" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<!-- Teal left accent -->
<line x1="364" y1="396" x2="364" y2="492" stroke="#0F6E56" stroke-width="4" stroke-linecap="round"/>
<text font-size="14" font-weight="500" fill="#2C2C2A" x="378" y="410">AWS Security Hub</text>
<text font-size="12" fill="#5F5E5A" x="378" y="430">Automated findings aggregation</text>
<text font-size="12" fill="#5F5E5A" x="378" y="447">2 findings auto-detected:</text>
<text font-size="12" fill="#5F5E5A" x="378" y="464">— SSH (port 22) exposed</text>
<text font-size="12" fill="#5F5E5A" x="378" y="481">— HTTP (port 80) exposed</text>

<!-- ====== MONITORING CONNECTIONS (dashed) ====== -->
<!-- Security Hub → EC2 -->
<line x1="501" y1="388" x2="501" y2="370" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<!-- Security Hub → S3 (through column gap) -->
<path d="M362,444 L335,444 L335,304 L320,304" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- ====== INTERNET BOX ====== -->
<rect x="270" y="526" width="140" height="36" rx="18" fill="#F1EFE8" stroke="#888780" stroke-width="1.5"/>
<text font-size="14" font-weight="500" fill="#2C2C2A" x="340" y="544" text-anchor="middle" dominant-baseline="central">Public internet</text>

<!-- Internet → S3 (left side, outside AWS boundary) -->
<path d="M270,544 L16,544 L16,304 L38,304" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- Internet → EC2 (right side, outside AWS boundary) -->
<path d="M410,544 L664,544 L664,304 L642,304" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ====== LEGEND ====== -->
<line x1="40" y1="583" x2="54" y2="583" stroke="#A32D2D" stroke-width="4" stroke-linecap="round"/>
<text font-size="11" fill="#5F5E5A" x="60" y="587">Critical</text>
<line x1="112" y1="583" x2="126" y2="583" stroke="#BA7517" stroke-width="4" stroke-linecap="round"/>
<text font-size="11" fill="#5F5E5A" x="132" y="587">Medium</text>
<line x1="190" y1="583" x2="204" y2="583" stroke="#0F6E56" stroke-width="4" stroke-linecap="round"/>
<text font-size="11" fill="#5F5E5A" x="210" y="587">Monitored</text>
<line x1="278" y1="583" x2="304" y2="583" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 3"/>
<text font-size="11" fill="#5F5E5A" x="310" y="587">Security Hub scan</text>
<line x1="418" y1="583" x2="442" y2="583" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow-dark)"/>
<text font-size="11" fill="#5F5E5A" x="448" y="587">External internet access</text>
</svg>
